services:
  outline:
    image: outlinewiki/outline:1.7
    env_file: .env
    expose:
      - "3000"
    ports:
      - "8900:3000"
    volumes:
      - storage-data:/var/lib/outline/data
      - ./patches/Header.EfEeDZzy.js:/opt/outline/build/app/assets/Header.EfEeDZzy.js:ro
      - ./patches/Shared.BjiKeSNH.js:/opt/outline/build/app/assets/Shared.BjiKeSNH.js:ro
      - ./patches/sw.js:/opt/outline/build/app/sw.js:ro
      - ./patches/index.html:/opt/outline/build/app/index.html:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  outline-provisioner:
    image: outlinewiki/outline:1.7
    env_file: .env
    command: ["node", "/opt/outline/provisioning/authentik-outline-sync.cjs", "--loop"]
    volumes:
      - ./provisioning:/opt/outline/provisioning:ro
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis
    env_file: .env
    expose:
      - "6379"
    volumes:
      - ./redis.conf:/redis.conf
    command: ["redis-server", "/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 3

  postgres:
    image: postgres:18
    env_file: .env
    expose:
      - "5432"
    volumes:
      - database-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "outline", "-U", "user"]
      interval: 30s
      timeout: 20s
      retries: 3
    environment:
      POSTGRES_USER: 'user'
      POSTGRES_PASSWORD: 'pass'
      POSTGRES_DB: 'outline'

volumes:
  storage-data:
  database-data:
